<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aurum Admin | Galeria</title>

<link rel="stylesheet" href="dashboard.css">
<link rel="stylesheet" href="gallery.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="dashboard">

<aside class="sidebar">

    <div class="sidebar-logo">

        <h2>AURUM</h2>

        <span>ADMIN</span>

    </div>

    <nav>

        <a href="dashboard.html">

            <i class="fas fa-house"></i>

            Dashboard

        </a>

        <a href="gallery.html" class="active">

            <i class="fas fa-images"></i>

            Galeria

        </a>

        <a href="services.html">

            <i class="fas fa-car"></i>

            Serviços

        </a>

        <a href="plans.html">

            <i class="fas fa-gem"></i>

            Planos

        </a>

        <a href="faq.html">

            <i class="fas fa-circle-question"></i>

            FAQ

        </a>

        <a href="#">

            <i class="fas fa-gear"></i>

            Configurações

        </a>

    </nav>

</aside>

<main class="content">
    <header class="topbar">

    <h1>Galeria</h1>

   <button class="btn-logout" id="openModal">

    <i class="fas fa-plus"></i>

    Nova imagem

</button>

</header>

<section class="gallery-content">

    <div id="galleryGrid" class="gallery-grid"></div>

</section>
<!-- ==========================================
     MODAL NOVA IMAGEM
========================================== -->

<div class="modal-overlay" id="modalOverlay">

    <div class="modal">

        <div class="modal-header">

            <h2>Nova imagem</h2>

           <button class="close-modal" id="closeModal">

                <i class="fas fa-xmark"></i>

            </button>

        </div>

        <div class="modal-body">

    <div class="upload-area">

        <i class="fas fa-cloud-arrow-up"></i>

        <h3>Selecionar imagem</h3>

        <p>Arraste uma imagem aqui ou clique para selecionar.</p>

        <input
            type="file"
            id="imageInput"
            accept="image/*"
            hidden>

        <button
            type="button"
            class="btn-upload"
            id="selectImage">

            Escolher imagem

        </button>

    </div>

    <div class="preview-container">

        <img
            id="previewImage"
            src=""
            alt="Preview">

    </div>

    <div class="form-group">

        <label>Título</label>

        <input
            type="text"
            id="imageTitle"
            placeholder="Ex: Lavagem Premium">

    </div>

    <div class="form-group">

        <label>Descrição</label>

        <textarea
            id="imageDescription"
            rows="4"
            placeholder="Descrição da imagem"></textarea>

    </div>

    <div class="modal-footer">

        <button
            type="button"
            class="btn-cancel"
            id="cancelModal">

            Cancelar

        </button>

        <button
            type="button"
            class="btn-save"
            id="saveImage">

            Salvar imagem

        </button>

    </div>

</div>

    </div>

</div>
</main>

    <!-- Conteúdo da Galeria virá aqui -->

</div>
<script type="module" src="js/gallery.js"></script>

</body>
</html>
