<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Aurum Admin | FAQ</title>

    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="gallery.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="dashboard">

    <aside class="sidebar">

        <div class="sidebar-logo">

            <h2>AURUM</h2>

            <span>ADMIN</span>

        </div>

        <nav>

            <a href="dashboard.html">

                <i class="fas fa-house"></i>

                Dashboard

            </a>

            <a href="gallery.html">

                <i class="fas fa-images"></i>

                Galeria

            </a>

           <a href="services.html">

                <i class="fas fa-car"></i>

                Serviços

            </a>

           <a href="plans.html">

                <i class="fas fa-gem"></i>

                Planos

            </a>

       <a href="faq.html" class="active">

    <i class="fas fa-circle-question"></i>

    FAQ

</a>

            <a href="#">

                <i class="fas fa-gear"></i>

                Configurações

            </a>

        </nav>

    </aside>

    <main class="content">

        <header class="topbar">

            <h1>Perguntas Frequentes</h1>

            <button class="btn-logout" id="openModal">

                <i class="fas fa-plus"></i>

                Nova Pergunta

            </button>

        </header>

        <section class="gallery-content">

            <div id="faqGrid" class="gallery-grid"></div>

        </section>
        <!-- ==========================================
     MODAL NOVA PERGUNTA
========================================== -->

<div class="modal-overlay" id="modalOverlay">

    <div class="modal">

        <div class="modal-header">

            <h2>Nova Pergunta</h2>

            <button class="close-modal" id="closeModal">

                <i class="fas fa-xmark"></i>

            </button>

        </div>

        <div class="modal-body">

            <div class="form-group">
<label>Pergunta</label>

<input
    type="text"
    id="faqQuestion"
    placeholder="Digite a pergunta">

            </div>

            <div class="form-group">

                <label>Resposta</label>
<textarea
    id="faqAnswer"
    rows="4"
    placeholder="Digite a resposta"></textarea>
            
</div>

            <div class="form-group">

                <label>Ordem de exibição</label>

                <input
                    type="number"
                   id="faqOrder"
                    min="1"
                    value="1">

            </div>

            <div class="modal-footer">

                <button
                    type="button"
                    class="btn-cancel"
                    id="cancelModal">

                    Cancelar

                </button>

                <button
                    type="button"
                    class="btn-save"
                   id="saveFaq">

                  Salvar Pergunta

            </button>

            </div>

        </div>

    </div>

</div>
    </main>

</div>

<script type="module" src="js/faq.js"></script>
</body>
</html>
